<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0C1A2E"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(29,78,216,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Blue glow orb left -->
  <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="200" cy="315" rx="400" ry="400" fill="url(#orb1)"/>
  <!-- Cyan glow orb right -->
  <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0891B2" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="1000" cy="200" rx="350" ry="350" fill="url(#orb2)"/>

  <!-- Logo mark — P icon -->
  <rect x="80" y="80" width="96" height="96" rx="22" fill="#1D4ED8"/>
  <line x1="104" y1="96" x2="104" y2="160" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <path d="M 104 96 C 104 96 148 96 148 118 C 148 140 104 144 104 144" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="110" y1="100" x2="110" y2="158" stroke="white" stroke-width="11" stroke-linecap="round"/>
  <path d="M 110 100 C 110 100 142 100 142 118 C 142 136 110 140 110 140" fill="none" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 122 97 C 142 97 145 108 145 114" fill="none" stroke="#93C5FD" stroke-width="11" stroke-linecap="round"/>
  <circle cx="145" cy="118" r="5.5" fill="#93C5FD" opacity="0.8"/>
  <line x1="145" y1="118" x2="158" y2="118" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 158 118 L 164 102 L 170 134 L 176 118" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="200" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-1">Psyche<tspan fill="#60A5FA">Flow</tspan></text>
  <text x="202" y="164" font-family="system-ui, sans-serif" font-size="12" fill="#3B5998" letter-spacing="3">MENTAL HEALTH AI · INDIA</text>

  <!-- Divider -->
  <line x1="80" y1="210" x2="1120" y2="210" stroke="rgba(29,78,216,0.3)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">Your mind,</text>
  <text x="80" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#3B82F6" letter-spacing="-2">understood.</text>

  <!-- Subtext -->
  <text x="80" y="448" font-family="system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">AI-powered clinical psychology platform for India</text>

  <!-- Stats row -->
  <rect x="80" y="490" width="220" height="80" rx="12" fill="rgba(29,78,216,0.15)" stroke="rgba(29,78,216,0.3)" stroke-width="1"/>
  <text x="190" y="530" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#60A5FA" text-anchor="middle">94%</text>
  <text x="190" y="554" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Suicide risk accuracy</text>

  <rect x="320" y="490" width="220" height="80" rx="12" fill="rgba(29,78,216,0.15)" stroke="rgba(29,78,216,0.3)" stroke-width="1"/>
  <text x="430" y="530" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#60A5FA" text-anchor="middle">19</text>
  <text x="430" y="554" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">ML models</text>

  <rect x="560" y="490" width="220" height="80" rx="12" fill="rgba(29,78,216,0.15)" stroke="rgba(29,78,216,0.3)" stroke-width="1"/>
  <text x="670" y="530" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#60A5FA" text-anchor="middle">14</text>
  <text x="670" y="554" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Clinical instruments</text>

  <rect x="800" y="490" width="220" height="80" rx="12" fill="rgba(29,78,216,0.15)" stroke="rgba(29,78,216,0.3)" stroke-width="1"/>
  <text x="910" y="530" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#60A5FA" text-anchor="middle">DPDP</text>
  <text x="910" y="554" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Act 2023 compliant</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="end">psycheflow.in</text>
</svg>